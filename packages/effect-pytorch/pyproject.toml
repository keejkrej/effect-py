[build-system]
requires = ["hatchling>=1.21.0"]
build-backend = "hatchling.build"

[project]
name = "effect-pytorch"
version = "0.1.0"
description = "Effect-py wrappers for PyTorch API"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "effect",
    "torch>=2.0",
    "torchvision>=0.15",
]

[tool.hatch.build.targets.wheel]
packages = ["src/effect_pytorch"]

[tool.uv.sources]
effect = { workspace = true }
